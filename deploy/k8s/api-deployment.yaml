apiVersion: apps/v1
kind: Deployment
metadata:
  name: wigarn-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wigarn-api
  template:
    metadata:
      labels:
        app: wigarn-api
    spec:
      containers:
        - name: api
          image: your-docker-registry/wigarn-api:latest
          env:
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: wigarn-postgres-secret
                  key: DATABASE_URL
          ports:
            - containerPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: wigarn-api
spec:
  type: ClusterIP
  ports:
    - port: 3001
      targetPort: 3001
  selector:
    app: wigarn-api
