version: '3.8'
services:
  #   web:
  #     build:
  #       context: .
  #       dockerfile: apps/web/Dockerfile
  #     ports : '3000:3000'
  #     env_file:
  #       - ./apps/web/.env
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=production
    depends_on:
      - db
    env_file:
      - ./apps/api/.env
  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: main
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
volumes:
  db_data:
