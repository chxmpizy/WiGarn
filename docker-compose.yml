version: '3.8'
services:
  web:
    container_name: wigarn-web-container
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production

    env_file:
      - ./apps/web/.env
  api:
    container_name: wigarn-api-container
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=production
    env_file:
      - ./apps/api/.env
